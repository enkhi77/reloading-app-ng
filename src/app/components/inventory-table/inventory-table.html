<div class="table-container">
  <table mat-table [dataSource]="tableData()" class="mat-elevation-z8">
    <ng-container matColumnDef="caliber">
      <th mat-header-cell *matHeaderCellDef>Caliber</th>
      <td mat-cell *matCellDef="let row">{{row.caliber}}</td>
    </ng-container>

    <ng-container matColumnDef="datePurchased">
      <th mat-header-cell *matHeaderCellDef>Purchase Date</th>
      <td mat-cell *matCellDef="let row">{{row.datePurchased}}</td>
    </ng-container>

    <ng-container matColumnDef="diameter">
      <th mat-header-cell *matHeaderCellDef>Diameter</th>
      <td mat-cell *matCellDef="let row">{{row.diameter}}</td>
    </ng-container>

    <ng-container matColumnDef="lot">
      <th mat-header-cell *matHeaderCellDef>Lot</th>
      <td mat-cell *matCellDef="let row">{{row.lot}}</td>
    </ng-container>

    <ng-container matColumnDef="manufacturer">
      <th mat-header-cell *matHeaderCellDef>Manufacturer</th>
      <td mat-cell *matCellDef="let row">{{row.manufacturer}}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let row">{{row.price}}</td>
    </ng-container>

    <ng-container matColumnDef="weight">
      <th mat-header-cell *matHeaderCellDef>Weight</th>
      <td mat-cell *matCellDef="let row">{{row.weight}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
